              - link [ref=e2514] [cursor=pointer]:
                - /url: //www.qidian.com/book/1047365508/
                - generic [ref=e2515]: "Transmigrating to the Warhammer universe, Andy finds himself as Iron Man, possessing the complete STC database. In this chaotic forty-first millennium, to avoid perishing with the insectoids, Andy decides to start by scavenging... farming! ...Belissau Caul: \"The bastard son of Om Messiah! Is that a complete standard construction template? Hand it over to me, the empire's revival begins today!\" Andy: \"It's too late now, let's farm first.\" ...Vashtor: \"Mortal, come to the Soul Forge, we're discussing a multi-billion dollar deal.\" Andy: \"Damn it! Back to farming.\" ...Tarasin: \"A perfect specimen of the Golden Age! The Soremunnas Museum needs an exhibit with your dynamism!\" Andy: \"Forgot the beginning, forgot the end, anyway, let's farm.\" ...The Radiant Seras: \"The core architecture of this machine is full of fascinating paradoxes...\" Andy: \"What are you babbling about, let's farm together?\" ...Shadowsun: \"For the sake of the highest good, your technology can propel the Tau Empire forward!\" Andy: \"I understand the logic, so can we farm first?\" ...Aurikan the Astrologer: \"Only Blackrock technology and time travel can save the galaxy.\" Andy: \"Not only.\" ... Ochimedes: \"WAAAGH! Big tin can! Your pistol isn't powerful enough, you need to paint it red! More big 'ka's!\" Andy: \"Hopeless, let's go farming.\" ... Iron Father Feros: \"So...to whom do you truly believe? The God of Machines or the Emperor?\" Andy: \"For farming.\""
