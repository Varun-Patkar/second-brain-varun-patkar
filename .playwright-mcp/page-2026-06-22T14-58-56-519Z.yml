              - 'link "\"You''re the most beautiful Konoha girl I''ve ever seen.\" \"Your eyes seem to hold stars.\" \"Can you teach me Konoha ninjutsu?\" \"My child is a gift to you.\" \"Can you give me the Tailed Beast?\" \"Something came up in Kumogakure, I have to go back.\" ... Good news! After transmigrating, I''m a Uchiha, starting with Sharingan, and at max level, I''ll be fighting in Gundam form! Bad news! This bloodline isn''t pure; it''s half Yotsuki clan blood from Kumogakure. Fortunately, I awakened a system of attributes. To survive, Kiyoshi has no choice but to carry out his evil will. [The Art of Speaking: Your words are more convincing.] [Powerful Body: Your stamina is inexhaustible.] \"The Black Will of Fire is still the Will of Fire!\" \"This is Konoha, you''re the ones who should get out!\"" [ref=e2496] [cursor=pointer]':
