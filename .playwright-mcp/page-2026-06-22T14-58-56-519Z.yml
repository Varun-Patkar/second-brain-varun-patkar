                - generic [ref=e2506]: "The story is set in the Douluo Continent I timeline! The original title of this book was *Douluo: Shura Huo Yuhao*. [Passive Abuse of Tang San][Non-Shrek Team-Up][Fully Powerful][Shura + Self-Created Godhood] During the Soul Master Competition, Tang Hao looked at Huo Yuhao with horror, exclaiming, \"Monster! You're a monster!\" Severely injured and dying, Tang Hao's eyes were filled with regret as he cried out to Tang San, \"Son! I was wrong! I shouldn't have provoked that terrifying monster!\" — Facing the calamity sweeping across the entire God Realm, Huo Yuhao, the God of Emotions, followed guidance and plunged into the temporal turbulence. When he opened his eyes again, he had arrived in the Douluo Continent I era, the same age as Tang San. Arriving at the starting point of his destiny, he originally wanted to become a god with his former companions, but unexpectedly, he was entangled by Xiao Wu from his previous life as soon as he entered the academy. Years later, facing Bibi Dong, the Pope of the Spirit Hall, Tang San's mother Ah Yin, and Gu Yue Na, the ruler of the spirit beasts… Tianmeng Ice Silkworm sighed softly, “Yuhao, why don't you just give in…” Huo Yuhao exclaimed, “I'm really not a succubus!” This is the story of a young man who regains his composure and captivates all with his personal charm. — The ultimate path to spirit sublimation, seizing the opportunity to change his destiny. Reborn in Douluo Continent I to find the truth, starting with inheriting the Asura God's position."
