              - link [ref=e2460] [cursor=pointer]:
                - /url: //www.qidian.com/book/1878693/
                - generic [ref=e2461]: "I hope everyone will support my new book, *Martial God Space*! He's the legendary internet figure, an overnight sensation who leads fashion trends. He's a rising star in the entertainment industry, his influence seen behind hit dramas like *The Emperor Han Wu 2*, *Lotus Lantern*, *Chinese Paladin*, *It Started With a Kiss*, and *The Deer and the Cauldron*, steadily climbing to the top. Because of him, Renren.com was born ahead of schedule, sweeping the nation and dominating Asia, competing with Facebook in the US. Because of him, YY was born ahead of schedule, rivaling Tencent and capturing over half of the instant messaging market. Facebook founder Mark Zuckerberg: \"My God, it's unbelievable that someone on the other side of the ocean had the same idea as me, but I absolutely do not admit to plagiarizing his idea; we are innocent!\" Reporter: \"Why are you so successful?\" Wang Zhengfei smiled slightly: \"You've been reborn, so you can do it too!\" Headquarters QQ Group: 96491353 (Full) Century Group 2: 146375108 Female Branch QQ Group: 119503477"
          - generic [ref=e2462]:
