                - generic [ref=e2524]: "\"Don't call me Tom! I'm Voldemort!\" Voldemort roared in exasperation. \"Come on, Tom,\" Ivy waved her hand dismissively. \"Do you really want to die with that weird name?\" \"I've already deciphered all your Horcruxes, and the love magic you stole from Harry's blood is nothing but a rootless weed. Even Lily Evans, whom you killed, has been resurrected… Are you really going to face death with the name Voldemort? You can't even face your past, so how can you talk about the future?\" ... \"Enough of this nonsense. I need to go back for dinner.\" A green lightning bolt shot out, splitting multiple times along its path. Its tree-like branches made the lightning resemble the might of nature, or the Grim Reaper's outstretched hand reaping lives… The tree-like green lightning struck several Death Eaters, illuminating Tom's pale, terrified face… PS: The protagonist comes from the legacy of Hogwarts, is a D&D spellcaster, has completed the main Harry Potter storyline, and, along with the hobbits, defeated the dragon Smaug. He used Voldemort's head as a toy. In Strider, he encountered the Planeswalkers, used the relics left by the magic of Karthusdon as consumables, wrote his own origin story, established a new city in the Sword Coast, gained solar divinity, and is now seeking further possibilities in the world of Grellion. Existing world outlines include: Ravnica (the Guild City), Azeroth, New Philexia, and the Marvel Universe."
