                  - generic [ref=e2468]: Writing a rant in a diary, which was seen by Iron Man.
              - 'link "Lin Feng transmigrated to the Marvel universe, spending his days writing in his diary and quietly developing his character! He acquired all sorts of superpowers, high-tech gadgets, and cultivation methods! But he gradually discovered that the world''s style was getting weird! Why did Tony Stark become Iron Man without going to Afghanistan? Why are Wonder Woman and Diana on the street? Why is there Spider-Woman Gwen besides Peter Parker? Iron Man: I''m not a fictional character created by someone else! Thor: I''m not some idiot! Captain Marvel: Your whole family is Captain Marvel! This world is getting weirder and weirder!" [ref=e2469] [cursor=pointer]':
                - /url: //www.qidian.com/book/1038646153/
                - generic [ref=e2470]: "Lin Feng transmigrated to the Marvel universe, spending his days writing in his diary and quietly developing his character! He acquired all sorts of superpowers, high-tech gadgets, and cultivation methods! But he gradually discovered that the world's style was getting weird! Why did Tony Stark become Iron Man without going to Afghanistan? Why are Wonder Woman and Diana on the street? Why is there Spider-Woman Gwen besides Peter Parker? Iron Man: I'm not a fictional character created by someone else! Thor: I'm not some idiot! Captain Marvel: Your whole family is Captain Marvel! This world is getting weirder and weirder!"
