                - /url: //www.qidian.com/book/1003630241/
                - generic [ref=e2479]: "This is an era where science and martial arts are equally important. After the Great Cataclysm, humanity discovered an ancient cultivation civilization, ushering in a new era of cultivation and beginning its colonization of the Kunlun Realm! This is an era fraught with crisis for humanity, but also one of passionate excitement and the emergence of numerous powerful figures! Chu Yunfan, who obtained the inheritance of the ancient civilization's powerful Dan Emperor and the supreme godhood above the Nine Heavens, will he carve out a path to heaven in such an era? Genius? Sorry, I am! Resources? My pills can overwhelm you! Inheritance? The supreme inheritance is within my mind! Our journey is through endless planes! This is Xiao Chen's third fantasy novel, following \"Ascension to the Great Wilderness\" and \"Martial God Space,\" a labor of love. This is a brand new era, a new era of cultivation! -- Regular Group: 497326944 Please change your nickname upon joining. VIP Group: 463696926 (Apprentices and above are welcome). Please change your nickname and share your subscription screenshot upon joining!"
